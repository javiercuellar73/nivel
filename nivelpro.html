<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nivel PRO</title>

<style>

body{
background:#3d3d3d;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:Segoe UI;
color:white;
overflow:hidden;
}

.spirit{
width:90%;
max-width:500px;
height:90px;
background:linear-gradient(#cfcf00,#ffff33,#cfcf00);
border:6px solid #222;
border-radius:12px;
position:relative;
box-shadow:0 10px 25px rgba(0,0,0,.5);
display:flex;
align-items:center;
justify-content:center;
}

.tube{
width:140px;
height:100%;
border-left:4px solid rgba(0,0,0,.7);
border-right:4px solid rgba(0,0,0,.7);
position:absolute;
}

.bubble{
width:55px;
height:55px;
background:radial-gradient(circle at 30% 30%, #fff, #d9d9d9);
border-radius:50%;
position:absolute;
top:17px;
left:calc(50% - 27px);
transition:left .05s linear;
box-shadow:
inset -3px -3px 10px rgba(0,0,0,.2),
inset 3px 3px 10px rgba(255,255,255,.6);
}

.value{
margin-top:40px;
font-size:3.5rem;
font-family:monospace;
background:#1f1f1f;
padding:12px 30px;
border-radius:8px;
border:2px solid #555;
min-width:200px;
text-align:center;
}

.controls{
margin-top:20px;
display:flex;
gap:15px;
}

button{
padding:10px 20px;
font-size:1rem;
border:none;
border-radius:6px;
background:#222;
color:white;
cursor:pointer;
}

button:hover{
background:#444;
}

#gate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:100;
}

.center-indicator{
position:absolute;
width:3px;
height:100%;
background:#000;
opacity:.5;
}

</style>
</head>

<body>

<div id="gate">
<h2>Activar sensores</h2>
<button onclick="activate()">ACTIVAR</button>
</div>

<div class="spirit">

<div class="tube"></div>
<div class="center-indicator"></div>
<div id="bubble" class="bubble"></div>

</div>

<div id="value" class="value">00.00</div>

<div class="controls">
<button onclick="calibrate()">CALIBRAR</button>
</div>

<script>

const bubble = document.getElementById("bubble")
const value = document.getElementById("value")
const gate = document.getElementById("gate")

let offset = 0
let smooth = 0
let lastVibrate = 0

const MAX_TILT = 20

function update(e){

let raw = e.gamma

if(raw === null) return

smooth = smooth*0.85 + raw*0.15

let angle = smooth - offset

let pos = 50 + (angle/MAX_TILT)*40

pos = Math.max(5,Math.min(95,pos))

bubble.style.left = `calc(${pos}% - 27px)`

value.innerText = Math.abs(angle).toFixed(2).padStart(5,"0")

if(Math.abs(angle) < 0.2){

value.style.color="#00ff00"

let now = Date.now()

if(navigator.vibrate && now-lastVibrate>1000){
navigator.vibrate(20)
lastVibrate = now
}

}else{

value.style.color="#ffffff"

}

}

function calibrate(){
offset = smooth
}

function activate(){

if(typeof DeviceOrientationEvent.requestPermission === "function"){

DeviceOrientationEvent.requestPermission().then(p=>{

if(p==="granted"){
window.addEventListener("deviceorientation",update)
gate.style.display="none"
}

})

}else{

window.addEventListener("deviceorientation",update)
gate.style.display="none"

}

}

window.onload = ()=>{

if(typeof DeviceOrientationEvent.requestPermission === "function"){

gate.style.display="flex"

}else{

window.addEventListener("deviceorientation",update)

}

}

</script>

</body>
</html>
