<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nivel PRO v1.9</title>
<style>
    body { margin:0; background:#111; font-family:sans-serif; color:white; text-align:center; overflow:hidden; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #version { position:fixed; bottom:10px; right:15px; font-size:12px; opacity:.5; font-family:monospace; }
    #modeLabel { margin-bottom:10px; font-size:14px; font-weight:bold; color:#ffff33; text-transform:uppercase; }
    .level { width:320px; height:80px; background:linear-gradient(#cfcf00,#ffff33,#cfcf00); border:4px solid #000; border-radius:40px; position:relative; box-shadow:0 0 20px rgba(0,0,0,0.5); }
    .bubble { width:45px; height:45px; border-radius:50%; background:#fff; position:absolute; top:17.5px; left:calc(50% - 22.5px); box-shadow:inset 2px 2px 5px rgba(0,0,0,0.3); }
    .value { font-size:5rem; font-family:monospace; font-weight:bold; margin:10px 0; }
    .sub { font-size:1.2rem; opacity:0.7; font-family:monospace; }
    #ios-btn { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; display:none; align-items:center; justify-content:center; }
    button { padding:20px; background:#ffff33; color:#000; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<div id="ios-btn"><button onclick="start()">ACTIVAR NIVEL</button></div>

<div id="modeLabel">Nivel de Precisión</div>
<div class="level"><div id="bubble" class="bubble"></div></div>
<div id="value" class="value">0.00°</div>
<div id="percent" class="sub">0.0%</div>
<div id="version">v1.9</div>

<script>
const bubble = document.getElementById("bubble");
const valDisp = document.getElementById("value");
const pctDisp = document.getElementById("percent");

function start() {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(res => {
            if (res === 'granted') {
                window.addEventListener("deviceorientation", handle);
                document.getElementById('ios-btn').style.display = 'none';
            }
        });
    } else {
        window.addEventListener("deviceorientation", handle);
        document.getElementById('ios-btn').style.display = 'none';
    }
}

function handle(e) {
    // Usamos radianes para cálculos precisos
    const beta = e.beta * (Math.PI / 180);
    const gamma = e.gamma * (Math.PI / 180);

    // Esta es la fórmula mágica: calcula el ángulo de balanceo (roll) 
    // independientemente de si el móvil está inclinado hacia adelante o atrás.
    let angleRad = Math.atan2(Math.sin(gamma), Math.cos(beta) * Math.cos(gamma));
    let angleDeg = angleRad * (180 / Math.PI);

    // Normalizar el ángulo para que 0 sea el canto largo
    // y 90 sea la plomada vertical.
    let displayAngle = Math.abs(angleDeg);
    
    // Si el móvil está "de pie", el ángulo real respecto a la vertical
    if (displayAngle > 45) {
        displayAngle = Math.abs(90 - displayAngle);
        document.getElementById("modeLabel").innerText = "MODO PLOMADA";
    } else {
        document.getElementById("modeLabel").innerText = "MODO NIVEL";
    }

    // Actualizar Interfaz
    valDisp.innerText = displayAngle.toFixed(2) + "°";
    valDisp.style.color = displayAngle < 0.1 ? "#00ff00" : "#fff";
    
    let p = Math.tan(displayAngle * Math.PI / 180) * 100;
    pctDisp.innerText = p.toFixed(1) + "%";

    // Mover burbuja (limitado a +/- 20 grados para visualización)
    let visualX = Math.max(-20, Math.min(20, angleDeg));
    let pos = 50 + (visualX / 20) * 40;
    bubble.style.left = `calc(${pos}% - 22.5px)`;
}

// Mostrar botón si es necesario (iOS) o iniciar
if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('ios-btn').style.display = 'flex';
} else {
    start();
}
</script>
</body>
</html>
