<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nivel Profesional</title>
    <style>
        body {
            background-color: #444;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            color: #eee;
        }

        /* Estética de la herramienta física */
        .spirit-level {
            width: 90%;
            max-width: 500px;
            height: 80px;
            background: linear-gradient(to bottom, #d4d400 0%, #ffff00 50%, #d4d400 100%);
            border: 5px solid #222;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Marcas de precisión */
        .glass-tube {
            width: 120px;
            height: 100%;
            border-left: 3px solid rgba(0,0,0,0.6);
            border-right: 3px solid rgba(0,0,0,0.6);
            position: relative;
            z-index: 2;
        }

        .bubble {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            position: absolute;
            top: 15px;
            box-shadow: inset -2px -2px 10px rgba(0,0,0,0.2), 2px 2px 5px rgba(255,255,255,0.5);
            transition: left 0.05s linear;
            z-index: 1;
        }

        .angle-value {
            margin-top: 40px;
            font-size: 3.5rem;
            font-weight: bold;
            background: #222;
            padding: 10px 30px;
            border-radius: 5px;
            border: 2px solid #666;
            min-width: 200px;
            text-align: center;
            font-family: monospace;
        }

        /* Botón de contingencia solo para iOS */
        #ios-gate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="ios-gate">
        <p>Toca para activar el sensor</p>
        <button onclick="activateSensors()" style="padding:20px; font-size:1.2rem;">ACTIVAR</button>
    </div>

    <div class="spirit-level">
        <div class="glass-tube"></div>
        <div id="bubble" class="bubble" style="left: calc(50% - 25px);"></div>
    </div>

    <div class="angle-value" id="val">00.00</div>

    <script>
        const bubble = document.getElementById('bubble');
        const valDisplay = document.getElementById('val');
        const gate = document.getElementById('ios-gate');

        function update(event) {
            let x = event.gamma; // Inclinación lateral
            if (x === null) return;

            // Mover la burbuja: mapeamos -20 a 20 grados al ancho del nivel
            let pos = 50 + (x * 2.5); 
            pos = Math.max(10, Math.min(90, pos)); // Limitar bordes
            
            bubble.style.left = `calc(${pos}% - 25px)`;
            valDisplay.innerText = Math.abs(x).toFixed(2).padStart(5, '0');

            // Feedback visual: Verde si está perfectamente nivelado
            if (Math.abs(x) < 0.1) {
                valDisplay.style.color = "#00ff00";
            } else {
                valDisplay.style.color = "#eee";
            }
        }

        function activateSensors() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', update);
                        gate.style.display = 'none';
                    }
                });
            } else {
                window.addEventListener('deviceorientation', update);
                gate.style.display = 'none';
            }
        }

        // Intento de auto-activación (Android)
        window.onload = () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                gate.style.display = 'flex';
            } else {
                window.addEventListener('deviceorientation', update);
            }
        };
    </script>
</body>
</html>
