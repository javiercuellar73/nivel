<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nivel PRO</title>

<style>

body{
margin:0;
background:#222;
color:white;
font-family:Segoe UI;
text-align:center;
overflow:hidden;
}

#controls{
padding:10px;
position:relative;
z-index:2;
}

button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:6px;
background:#333;
color:white;
}

button:hover{background:#555;}

.level{
width:90%;
max-width:520px;
height:80px;
background:linear-gradient(#cfcf00,#ffff33,#cfcf00);
border:5px solid #111;
border-radius:10px;
margin:auto;
position:relative;
}

.bubble{
width:50px;
height:50px;
border-radius:50%;
background:white;
position:absolute;
top:15px;
left:calc(50% - 25px);
transition:left .05s linear;
}

.value{
font-size:3rem;
margin-top:15px;
font-family:monospace;
}

#circle{
width:260px;
height:260px;
border-radius:50%;
border:6px solid #111;
background:#3a3a3a;
margin:auto;
display:none;
position:relative;
}

#dot{
width:28px;
height:28px;
background:white;
border-radius:50%;
position:absolute;
top:116px;
left:116px;
}

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
z-index:0;
}

#line{
position:fixed;
top:50%;
left:0;
width:100%;
height:4px;
background:red;
display:none;
z-index:1;
}

</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>
<div id="line"></div>

<div id="controls">
<button onclick="setMode('level')">Nivel</button>
<button onclick="setMode('plumb')">Plomada</button>
<button onclick="setMode('circle')">Circular</button>
<button onclick="cameraMode()">Cámara</button>
</div>

<div class="level" id="levelUI">
<div id="bubble" class="bubble"></div>
</div>

<div id="circle">
<div id="dot"></div>
</div>

<div class="value" id="value">0.00°</div>
<div id="slope">0 %</div>

<script>

let mode="level"

const bubble=document.getElementById("bubble")
const value=document.getElementById("value")
const slope=document.getElementById("slope")

const circle=document.getElementById("circle")
const dot=document.getElementById("dot")
const levelUI=document.getElementById("levelUI")

const cam=document.getElementById("camera")
const line=document.getElementById("line")

let smoothX=0
let smoothY=0

let zeroX=0
let zeroY=0

let lastMove=Date.now()

const MAX=20

function setMode(m){

mode=m

cam.style.display="none"
line.style.display="none"

if(m==="circle"){
circle.style.display="block"
levelUI.style.display="none"
}else{
circle.style.display="none"
levelUI.style.display="block"
}

}

function cameraMode(){

mode="camera"

circle.style.display="none"
levelUI.style.display="none"

cam.style.display="block"
line.style.display="block"

navigator.mediaDevices.getUserMedia({
video:{
facingMode:{exact:"environment"}
}
}).then(stream=>{
cam.srcObject=stream
})

}

function update(e){

if(e.gamma==null)return

smoothX=smoothX*0.92 + e.gamma*0.08
smoothY=smoothY*0.92 + e.beta*0.08

let x=smoothX-zeroX
let y=smoothY-zeroY

let motion=Math.abs(e.gamma)+Math.abs(e.beta)

if(motion>0.5){
lastMove=Date.now()
}

if(Date.now()-lastMove>2000){

zeroX=zeroX*0.98 + smoothX*0.02
zeroY=zeroY*0.98 + smoothY*0.02

}

if(mode==="level"){

let pos=50+(x/MAX)*40
pos=Math.max(5,Math.min(95,pos))

bubble.style.left=`calc(${pos}% - 25px)`

display(x)

}

if(mode==="plumb"){

let pos=50+(y/MAX)*40
pos=Math.max(5,Math.min(95,pos))

bubble.style.left=`calc(${pos}% - 25px)`

display(y)

}

if(mode==="circle"){

let px=116+(x/MAX)*80
let py=116+(y/MAX)*80

dot.style.left=px+"px"
dot.style.top=py+"px"

let a=Math.sqrt(x*x+y*y)

display(a)

}

if(mode==="camera"){

display(x)

if(Math.abs(x)<0.2){

line.style.background="#00ff00"

}else{

line.style.background="#ff3333"

}

}

}

function display(a){

value.innerText=a.toFixed(2)+"°"

let percent=Math.tan(a*Math.PI/180)*100

slope.innerText=percent.toFixed(1)+" %"

if(Math.abs(a)<0.2){

value.style.color="#00ff00"

}else{

value.style.color="white"

}

}

window.addEventListener("deviceorientation",update)

</script>

</body>
</html>
