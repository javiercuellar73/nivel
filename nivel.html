<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nivel PRO v1.8</title>
<style>
    body { margin:0; background:#1c1c1c; font-family:sans-serif; color:white; text-align:center; overflow:hidden; height: 100vh; }
    #version { position:fixed; bottom:10px; right:15px; font-size:12px; opacity:.6; font-family:monospace; }
    #modeLabel { margin-top:20px; font-size:16px; font-weight:bold; color:#ffff33; text-transform:uppercase; }
    .level { width:90%; max-width:500px; height:85px; background:linear-gradient(#cfcf00,#ffff33,#cfcf00); border:4px solid #000; border-radius:10px; margin:20px auto; position:relative; display:none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .bubble { width:50px; height:50px; border-radius:50%; background:#fff; position:absolute; top:17.5px; left:calc(50% - 25px); transition:left 0.05s linear; box-shadow:inset 2px 2px 5px rgba(0,0,0,0.3); }
    .value { font-size:4.8rem; margin-top:10px; font-family:monospace; font-weight:bold; }
    .sub { font-size:1.2rem; opacity:0.8; margin:5px; font-family:monospace; }
    #circle { width:250px; height:250px; border-radius:50%; border:5px solid #000; background:#333; margin:20px auto; display:none; position:relative; }
    #dot { width:35px; height:35px; background:#fff; border-radius:50%; position:absolute; top:107.5px; left:107.5px; }
    #ios-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:100; display:none; }
    button { padding:12px 24px; background:#333; color:#fff; border:none; border-radius:5px; font-weight:bold; }
</style>
</head>
<body>

<div id="ios-overlay"><button onclick="requestAccess()">INICIAR NIVEL</button></div>

<div id="modeLabel">Detectando...</div>

<div class="level" id="levelUI">
    <div id="bubble" class="bubble"></div>
</div>

<div id="circle">
    <div id="dot"></div>
</div>

<div class="value" id="value">0.00°</div>
<div class="sub" id="percent">0 %</div>
<div class="sub" id="ratio">1 : ∞</div>

<div id="version">v1.8</div>

<script>
let currentMode = "level";
const bubble = document.getElementById("bubble");
const valDisp = document.getElementById("value");
const pctDisp = document.getElementById("percent");
const ratDisp = document.getElementById("ratio");
const label = document.getElementById("modeLabel");
const circle = document.getElementById("circle");
const dot = document.getElementById("dot");
const levelUI = document.getElementById("levelUI");

function requestAccess() {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
            if (state === 'granted') {
                window.addEventListener("deviceorientation", update);
                document.getElementById('ios-overlay').style.display = 'none';
            }
        });
    }
}

function update(e) {
    let b = e.beta;  // Inclinación adelante/atrás
    let g = e.gamma; // Inclinación lateral

    // 1. DETECCIÓN DE MODO (Basado en la posición física real)
    // Si el móvil está casi plano (boca arriba) -> MODO SUPERFICIE
    if (Math.abs(b) < 30) {
        currentMode = "circle";
    } 
    // Si el móvil está de pie (vertical) o apoyado en el canto -> MODO NIVEL
    else {
        currentMode = "level";
    }

    if (currentMode === "level") {
        levelUI.style.display = "block";
        circle.style.display = "none";
        label.innerText = (Math.abs(b) > 75) ? "Plomada Vertical" : "Nivel de Canto";
        
        // El ángulo que nos interesa es el giro lateral (gamma)
        // Pero cuando b > 90 (boca abajo), los ejes se invierten en algunos navegadores
        let angle = g;
        
        // Dibujar burbuja
        let pos = 50 + (angle / 20) * 45;
        pos = Math.max(5, Math.min(95, pos));
        bubble.style.left = `calc(${pos}% - 25px)`;
        
        render(angle);
    } 
    else {
        levelUI.style.display = "none";
        circle.style.display = "block";
        label.innerText = "Superficie (Plano)";
        
        // En superficie, mostramos la desviación total
        let px = 107.5 + (g / 20) * 107.5;
        let py = 107.5 + (b / 20) * 107.5;
        dot.style.left = Math.max(0, Math.min(215, px)) + "px";
        dot.style.top = Math.max(0, Math.min(215, py)) + "px";
        
        render(Math.sqrt(g*g + b*b));
    }
}

function render(a) {
    let ang = Math.abs(a);
    valDisp.innerText = ang.toFixed(2) + "°";
    valDisp.style.color = ang < 0.2 ? "#00ff00" : "#fff";
    
    let rad = ang * Math.PI / 180;
    let p = Math.tan(rad) * 100;
    pctDisp.innerText = ang > 85 ? "--- %" : p.toFixed(1) + " %";
    
    let r = 1 / Math.tan(rad);
    ratDisp.innerText = (ang > 85 || ang < 0.05) ? "1 : ∞" : "1 : " + r.toFixed(1);
}

if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('ios-overlay').style.display = 'flex';
} else {
    window.addEventListener("deviceorientation", update);
}
</script>
</body>
</html>
